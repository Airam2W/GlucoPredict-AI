<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Paciente</title>
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/agregar_paciente.css">
</head>
<body>

<h2>Agregar paciente</h2>

<form id="formPaciente">
    <input type="text" id="nombrePaciente" placeholder="Nombre completo" required><br><br>
    <input type="number" id="edadPaciente" placeholder="Edad" min="0" max="120" required><br><br>
    <select id="sexoPaciente" required>
        <option value="" disabled selected>Sexo</option>
        <option value="Femenino">Femenino</option>
        <option value="Masculino">Masculino</option>
        <option value="Otro">Otro</option>
    </select><br><br>
    <input type="number" id="pesoPaciente" placeholder="Peso (kg)" min="1" max="400" step="0.1"><br><br>
    <input type="number" id="alturaPaciente" placeholder="Altura (cm)" min="30" max="250" step="0.1"><br><br>
    <input type="tel" id="telefonoPaciente" placeholder="Telefono"><br><br>
    <input type="email" id="correoPaciente" placeholder="Correo electronico"><br><br>
    <input type="text" id="contactoEmergenciaPaciente" placeholder="Contacto de emergencia"><br><br>
    <input type="text" id="tipoSangrePaciente" placeholder="Tipo de sangre (ej. O+)"><br><br>
    <textarea id="observacionesPaciente" placeholder="Observaciones relevantes" rows="4"></textarea><br><br>
    <button type="submit">Guardar paciente</button>
</form>

<div class="page-actions compact-actions">
    <button id="btnVolver" class="btn-ghost">Volver</button>
</div>

<script type="module" src="/GlucoPredict-AI/BackEnd/JS/agregar_paciente.js"></script>
<script type="module" src="/GlucoPredict-AI/BackEnd/JS/auth-guard.js"></script>

</body>
</html>
