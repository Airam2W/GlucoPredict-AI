<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Clinica</title>
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/agregar_clinica.css">
</head>
<body>

<h2>Agregar nueva clinica</h2>

<form id="formClinica">
    <input type="text" id="nombreClinica" placeholder="Nombre de la clinica" required><br><br>
    <input type="text" id="direccionClinica" placeholder="Direccion" required><br><br>
    <input type="tel" id="telefonoClinica" placeholder="Telefono de contacto"><br><br>
    <input type="email" id="correoClinica" placeholder="Correo de contacto"><br><br>
    <input type="text" id="responsableClinica" placeholder="Responsable medico"><br><br>
    <input type="text" id="especialidadClinica" placeholder="Especialidad principal"><br><br>
    <input type="text" id="horarioClinica" placeholder="Horario de atencion (ej. Lun-Vie 08:00-16:00)"><br><br>
    <button type="submit">Guardar clinica</button>
</form>

<div class="page-actions compact-actions">
    <button class="btn-ghost" onclick="window.location.href='medico_dashboard.html'">Volver</button>
</div>

<script type="module" src="/GlucoPredict-AI/BackEnd/JS/agregar_clinica.js"></script>
<script type="module" src="/GlucoPredict-AI/BackEnd/JS/auth-guard.js"></script>
</body>
</html>
