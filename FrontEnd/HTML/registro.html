<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="icon" type="image/png" href="/GlucoPredict-AI/FrontEnd/img/logosolo.png">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/index.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/registro.css">
</head>

<body class="registro-page no-corner-logo">
    <div class="modal-overlay active registro-overlay-static">
        <div class="modal-card registro-card-static">
            <a href="/GlucoPredict-AI/index.html" class="modal-close registro-back" aria-label="Volver al inicio">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
            <img src="/GlucoPredict-AI/FrontEnd/img/logosolo.png" class="modal-logo" alt="Logo">
            <h2>Crear cuenta</h2>

            <form id="registroForm">
                <div class="field">
                    <label for="emailInput">CORREO ELECTRONICO</label>
                    <input type="email" id="emailInput" placeholder="tu@correo.com" required>
                </div>

                <div class="field">
                    <label for="passwordInput">CONTRASENA</label>
                    <input type="password" id="passwordInput" placeholder="Minimo 6 caracteres" required>
                </div>

                <button type="submit" class="btn-submit">Registrarse</button>
            </form>

            <p class="registro-link">
                Ya tienes cuenta?
                <a href="/GlucoPredict-AI/index.html">Inicia sesion</a>
            </p>
        </div>
    </div>

    <script type="module" src="/GlucoPredict-AI/BackEnd/JS/registro.js"></script>
</body>

</html>
