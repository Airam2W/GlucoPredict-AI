<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar a version de paga</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/GlucoPredict-AI/FrontEnd/img/logosolo.png">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/paga.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
</head>

<body>

<h2>Actualizar a version de paga</h2>

<p>
    La version de paga te permitira acceder a funcionalidades avanzadas como:
</p>

<div class="explicacion-item">
    <strong>Simulador de recomendaciones:</strong>
    <br>
    - Podras simular escenarios y obtener sugerencias personalizadas.
    <br>
    - Acceso a la creacion de clinicas, pacientes y perfiles ilimitados.
</div>

<!-- 🔥 MODAL DE PAGO -->
<div id="modalPago" class="modal hidden">
    <div class="modal-content">

        <span class="close" id="cerrarModal">&times;</span>

        <h3>💳 Pago con tarjeta</h3>

        <div class="form-group">
            <label>Número de tarjeta</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
        </div>

        <div class="form-group">
            <label>Nombre del titular</label>
            <input type="text" id="cardName" placeholder="Juan Pérez">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Expiración</label>
                <input type="text" id="cardExpiry" placeholder="MM/AA">
            </div>

            <div class="form-group">
                <label>CVV</label>
                <input type="text" id="cardCVV" placeholder="123">
            </div>
        </div>

        <button id="btnConfirmarPago" class="btn-confirmar">
            Confirmar pago
        </button>

    </div>
</div>

<div class="buttons">
    <button id="btnPagar">Volverse de paga</button>
    <button id="btnCancelar">Cancelar</button>
</div>

<script type="module" src="/GlucoPredict-AI/BackEnd/JS/paga.js"></script>

</body>
</html>
