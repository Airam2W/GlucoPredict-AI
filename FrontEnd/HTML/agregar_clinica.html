<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Clínica</title>
    <link rel="icon" type="image/png" href="/GlucoPredict-AI/FrontEnd/img/logosolo.png">
    <script src="/GlucoPredict-AI/BackEnd/JS/theme.js"></script>
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/agregar_clinica.css">
</head>
<body>

<h2 id="tituloClinica">Agregar nueva clínica</h2>

<form id="formClinica" novalidate>
    <input type="text" id="nombreClinica" placeholder="Nombre de la clínica" required><br><br>
    <input type="text" id="direccionClinica" placeholder="Dirección" required><br><br>
    <input type="tel" id="telefonoClinica" placeholder="Teléfono de contacto"><br><br>
    <input type="email" id="correoClinica" placeholder="Correo de contacto"><br><br>
    <input type="text" id="responsableClinica" placeholder="Responsable médico"><br><br>
    <input type="text" id="especialidadClinica" placeholder="Especialidad principal"><br><br>
    <input type="text" id="horarioClinica" placeholder="Horario de atención (ej. Lun-Vie 08:00-16:00)"><br><br>
    <button type="submit" id="btnGuardarClinica">Guardar clínica</button>
</form>

<div class="page-actions compact-actions">
    <button class="btn-ghost" onclick="window.location.href='medico_dashboard.html'">Volver</button>
</div>

<script type="module" src="/GlucoPredict-AI/BackEnd/JS/agregar_clinica.js"></script>
<script type="module" src="/GlucoPredict-AI/BackEnd/JS/auth-guard.js"></script>
</body>
</html>
