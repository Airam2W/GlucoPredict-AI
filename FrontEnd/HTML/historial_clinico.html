<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clinico</title>
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/historial_clinico.css">
    <link rel="stylesheet" href="/GlucoPredict-AI/FrontEnd/CSS/base.css">
</head>
<body>
    
<img src="/GlucoPredict-AI/FrontEnd/img/logo.png" alt="Logo" class="corner-logo" onclick="window.location.href='../HTML/panel_principal.html'">

<h2>Historial Clinico</h2>

<p>
    Ingrese la informacion clinica del paciente o cargue un archivo PDF.
    El sexo se recupera del perfil y el IMC se calcula automaticamente cuando hay peso y altura.
</p>

<hr>
 
<h3>Subir historial clinico (PDF)</h3>
<input type="file" id="pdfFile" accept="application/pdf">
<p id="pdfStatus"></p>

<hr>

<h3>Informacion personal</h3>

<form id="historialForm" novalidate>

<label>Nombre completo:</label><br>
<input type="text" id="name" required><br><br>

<label>Edad:</label><br>
<input type="number" id="age" required><br><br>

<label>Sexo:</label><br>
<select id="sex" required>
    <option value="" disabled selected>Selecciona una opcion</option>
    <option value="Masculino">Masculino</option>
    <option value="Femenino">Femenino</option>
    <option value="Otro">Otro</option>
</select><br><br>

<hr>

<h3>Antecedentes</h3>

<label>
    <input type="checkbox" id="family">
    Antecedentes familiares de diabetes
</label><br><br>

<label>
    <input type="checkbox" id="hypertension">
    Diagnostico previo de hipertension
</label><br><br>

<hr>

<h3>Habitos</h3>

<label>Actividad fisica:</label><br>
<select id="activity">
    <option value="" disabled selected>Selecciona una opcion</option>
    <option value="sedentario">Sedentario</option>
    <option value="moderado">Moderado</option>
    <option value="activo">Activo</option>
</select><br><br>

<label>Consumo de alcohol:</label><br>
<select id="alcohol">
    <option value="" disabled selected>Selecciona una opcion</option>
    <option value="No">No consume</option>
    <option value="Ocasional">Ocasional</option>
    <option value="Frecuente">Frecuente</option>
</select><br><br>

<hr>

<h3>Datos clinicos</h3>

<label>Indice de Masa Corporal (IMC):</label><br>
<input type="number" id="bmi" step="0.1" required><br><br>

<label>Glucosa en ayunas (mg/dL):</label><br>
<input type="number" id="glucose" required><br><br>

<label>Presion arterial sistolica (mmHg):</label><br>
<input type="number" id="bp" required><br><br>

<div class="page-actions compact-actions">
    <button type="submit">Guardar historial clinico</button>
    <button type="button" id="btnVolver">Volver a la prediccion</button>
</div>

</form>

<p id="saveStatus"></p>

<script type="module" src="/GlucoPredict-AI/BackEnd/JS/historial_clinico.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module" src="/GlucoPredict-AI/BackEnd/JS/auth-guard.js"></script>

</body>
</html>
